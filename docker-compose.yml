# Postgres is NOT run here — this stack expects an external Postgres instance
# (e.g. your local Postgres on port 5433, matching DATABASE_URL in .env).
# Set up the schema first: psql -U postgres -p 5433 -d standup -f db-setup.sql
#
# 3 services (mirrors prod on Azure Container Apps):
#   standup-mcp  — tools (internal)
#   agent        — ONE agent serving BOTH domains (AGENT_ROLE=all, internal)
#   orchestrator — API + webhooks + the built SPA (open http://localhost:8000)
# For frontend hot-reload during dev: `cd frontend && npm run dev` (proxies /api to :8000).

services:
  standup-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    ports:
      - "8010:8010"
    env_file: .env
    environment:
      MCP_HOST: standup-mcp
      MCP_PORT: "8010"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8010),3); s.close()"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "8020:8020"
    env_file: .env
    environment:
      AGENT_ROLE: all          # one agent serves standup + project skills
      AGENT_HOST: agent
      AGENT_PORT: "8020"
      MCP_HOST: standup-mcp
      MCP_PORT: "8010"
    depends_on:
      standup-mcp:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      A2A_SCHEME: http
      AGENT_HOST: agent
      AGENT_PORT: "8020"
      MCP_SCHEME: http
      MCP_HOST: standup-mcp
      MCP_PORT: "8010"
    depends_on:
      agent:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
