# Rendered at container start by the nginx image's envsubst step
# (/etc/nginx/templates/*.template -> /etc/nginx/conf.d/). Only ${ORCHESTRATOR_URL}
# is substituted; nginx's own $uri/$host/etc. are left intact (the entrypoint only
# replaces defined environment variables).
#
#   Local docker-compose : ORCHESTRATOR_URL=http://orchestrator:8000
#   Azure Container Apps  : ORCHESTRATOR_URL=https://<orchestrator-internal-fqdn>
#
# The frontend is the single public entrypoint: it serves the SPA and proxies both
# the REST API (/api/) and the Recall.ai webhook (/webhooks/) to the orchestrator,
# so the orchestrator itself can stay on internal ingress.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass ${ORCHESTRATOR_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;              # SNI for the ACA internal TLS upstream

        # Live-status SSE (/api/standups/{id}/stream): stream, don't buffer.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_read_timeout 3600s;
    }

    location /webhooks/ {
        proxy_pass ${ORCHESTRATOR_URL}/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }
}
