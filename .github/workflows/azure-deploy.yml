name: Build and Deploy to Azure Container Apps

# ── Design ────────────────────────────────────────────────────────────────────
# Parallel builds, ACR layer cache, path filters. PRs build-only (validate);
# push to `main` builds AND deploys to production.
#
# Orbo = 3 images, 3 Container Apps:
#   orbo-orchestrator -> orchestrator  (EXTERNAL ingress, :8000) — serves the SPA
#                        + /api + /webhooks; this FQDN is the Recall webhook base.
#   orbo-agent        -> agent         (internal, :8020, AGENT_ROLE=all) — one
#                        agent serving BOTH standup + project skills.
#   orbo-mcp          -> mcp           (internal, :8010) — tools.
#
# ── Required GitHub config ────────────────────────────────────────────────────
# ALL jobs run under the `production` Environment, so every secret/variable below
# can live in the production Environment (repo-level also works — environment
# jobs can read both). Put them wherever is convenient, but be consistent.
#   Variables: ACR_NAME, RESOURCE_GROUP, ORCHESTRATOR_APP, AGENT_APP, MCP_APP,
#     AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_DEPLOYMENT, AZURE_OPENAI_API_VERSION,
#     RECALL_REGION, MS_GRAPH_SENDER_EMAIL, LLM_PROVIDER, ORCHESTRATOR_MODEL,
#     SLM_PROVIDER, SUMMARIZE_MODEL, DELIVER_MODEL, JWT_ALGORITHM,
#     JWT_EXPIRY_MINUTES, LOG_LEVEL
#   Secrets: ACR_USERNAME, ACR_PASSWORD, AZURE_CREDENTIALS, DATABASE_URL,
#     JWT_SECRET, RECALL_API_KEY, RECALL_WEBHOOK_SECRET, AZURE_OPENAI_API_KEY,
#     MS_GRAPH_TENANT_ID, MS_GRAPH_CLIENT_ID, MS_GRAPH_CLIENT_SECRET
# See DEPLOY-AZURE.md for one-time infra creation.
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**', '**/*.md', '.gitignore']
  pull_request:
    branches: [main]
    paths-ignore: ['docs/**', '**/*.md', '.gitignore']
  workflow_dispatch:

env:
  ENV_LABEL: prod

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      push_image: ${{ steps.resolve.outputs.push_image }}
    steps:
      - name: Resolve
        id: resolve
        run: |
          PUSH=$([ "${{ github.event_name }}" = "pull_request" ] && echo "false" || echo "true")
          echo "push_image=$PUSH" >> $GITHUB_OUTPUT
          echo "event=${{ github.event_name }} push=$PUSH"

  # ── Parallel builds ─────────────────────────────────────────────────────────
  # `environment: production` so the jobs can read ACR_NAME / ACR_USERNAME /
  # ACR_PASSWORD whether they're set at repo or environment level.
  build-orchestrator:
    needs: setup
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.orchestrator     # multi-stage: builds the SPA too
          push: ${{ needs.setup.outputs.push_image }}
          tags: |
            ${{ vars.ACR_NAME }}.azurecr.io/orbo-orchestrator:${{ env.ENV_LABEL }}-${{ github.sha }}
            ${{ vars.ACR_NAME }}.azurecr.io/orbo-orchestrator:${{ env.ENV_LABEL }}-latest
          cache-from: type=registry,ref=${{ vars.ACR_NAME }}.azurecr.io/orbo-orchestrator:buildcache
          cache-to:   type=registry,ref=${{ vars.ACR_NAME }}.azurecr.io/orbo-orchestrator:buildcache,mode=max

  build-agent:
    needs: setup
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.agent
          push: ${{ needs.setup.outputs.push_image }}
          tags: |
            ${{ vars.ACR_NAME }}.azurecr.io/orbo-agent:${{ env.ENV_LABEL }}-${{ github.sha }}
            ${{ vars.ACR_NAME }}.azurecr.io/orbo-agent:${{ env.ENV_LABEL }}-latest
          cache-from: type=registry,ref=${{ vars.ACR_NAME }}.azurecr.io/orbo-agent:buildcache
          cache-to:   type=registry,ref=${{ vars.ACR_NAME }}.azurecr.io/orbo-agent:buildcache,mode=max

  build-mcp:
    needs: setup
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.mcp
          push: ${{ needs.setup.outputs.push_image }}
          tags: |
            ${{ vars.ACR_NAME }}.azurecr.io/orbo-mcp:${{ env.ENV_LABEL }}-${{ github.sha }}
            ${{ vars.ACR_NAME }}.azurecr.io/orbo-mcp:${{ env.ENV_LABEL }}-latest
          cache-from: type=registry,ref=${{ vars.ACR_NAME }}.azurecr.io/orbo-mcp:buildcache
          cache-to:   type=registry,ref=${{ vars.ACR_NAME }}.azurecr.io/orbo-mcp:buildcache,mode=max

  # ── Deploy (skipped on PRs) ───────────────────────────────────────────────────
  deploy:
    needs: [setup, build-orchestrator, build-agent, build-mcp]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production
      url: ${{ steps.get-url.outputs.app_url }}
    steps:
      - name: Validate required secrets and variables
        run: |
          missing=()
          [[ -z "${{ secrets.AZURE_CREDENTIALS }}"     ]] && missing+=("secret:AZURE_CREDENTIALS")
          [[ -z "${{ secrets.DATABASE_URL }}"          ]] && missing+=("secret:DATABASE_URL")
          [[ -z "${{ secrets.JWT_SECRET }}"            ]] && missing+=("secret:JWT_SECRET")
          [[ -z "${{ secrets.RECALL_API_KEY }}"        ]] && missing+=("secret:RECALL_API_KEY")
          [[ -z "${{ secrets.RECALL_WEBHOOK_SECRET }}" ]] && missing+=("secret:RECALL_WEBHOOK_SECRET")
          [[ -z "${{ secrets.AZURE_OPENAI_API_KEY }}"  ]] && missing+=("secret:AZURE_OPENAI_API_KEY")
          [[ -z "${{ vars.ACR_NAME }}"                 ]] && missing+=("var:ACR_NAME")
          [[ -z "${{ vars.RESOURCE_GROUP }}"           ]] && missing+=("var:RESOURCE_GROUP")
          [[ -z "${{ vars.ORCHESTRATOR_APP }}"         ]] && missing+=("var:ORCHESTRATOR_APP")
          [[ -z "${{ vars.AGENT_APP }}"                ]] && missing+=("var:AGENT_APP")
          [[ -z "${{ vars.MCP_APP }}"                  ]] && missing+=("var:MCP_APP")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "❌ Missing in the 'production' GitHub Environment (or repo): ${missing[*]}"; exit 1
          fi
          echo "✅ Required secrets/variables present"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Resolve image tags + live FQDNs
        id: ctx
        run: |
          SHA="${{ github.sha }}"; L="${{ env.ENV_LABEL }}"; RG="${{ vars.RESOURCE_GROUP }}"
          ACR_URL="${{ vars.ACR_NAME }}.azurecr.io"
          echo "orchestrator_img=$ACR_URL/orbo-orchestrator:${L}-${SHA}" >> $GITHUB_OUTPUT
          echo "agent_img=$ACR_URL/orbo-agent:${L}-${SHA}"               >> $GITHUB_OUTPUT
          echo "mcp_img=$ACR_URL/orbo-mcp:${L}-${SHA}"                    >> $GITHUB_OUTPUT
          fqdn() { az containerapp show -n "$1" -g "$RG" --query properties.configuration.ingress.fqdn -o tsv; }
          echo "orchestrator_fqdn=$(fqdn ${{ vars.ORCHESTRATOR_APP }})" >> $GITHUB_OUTPUT
          echo "agent_fqdn=$(fqdn ${{ vars.AGENT_APP }})" >> $GITHUB_OUTPUT
          echo "mcp_fqdn=$(fqdn ${{ vars.MCP_APP }})" >> $GITHUB_OUTPUT

      - name: Deploy mcp
        run: |
          az containerapp update -n "${{ vars.MCP_APP }}" -g "${{ vars.RESOURCE_GROUP }}" \
            --image "${{ steps.ctx.outputs.mcp_img }}" \
            --min-replicas 0 --max-replicas 2 \
            --set-env-vars \
              "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
              "MCP_PORT=8010" \
              "MS_GRAPH_TENANT_ID=${{ secrets.MS_GRAPH_TENANT_ID }}" \
              "MS_GRAPH_CLIENT_ID=${{ secrets.MS_GRAPH_CLIENT_ID }}" \
              "MS_GRAPH_CLIENT_SECRET=${{ secrets.MS_GRAPH_CLIENT_SECRET }}" \
              "MS_GRAPH_SENDER_EMAIL=${{ vars.MS_GRAPH_SENDER_EMAIL }}" \
              "LOG_LEVEL=${{ vars.LOG_LEVEL }}"

      - name: Deploy agent
        run: |
          az containerapp update -n "${{ vars.AGENT_APP }}" -g "${{ vars.RESOURCE_GROUP }}" \
            --image "${{ steps.ctx.outputs.agent_img }}" \
            --min-replicas 0 --max-replicas 2 \
            --set-env-vars \
              "AGENT_ROLE=all" \
              "AGENT_HOST=${{ steps.ctx.outputs.agent_fqdn }}" \
              "AGENT_PORT=443" \
              "A2A_SCHEME=https" \
              "AZURE_OPENAI_ENDPOINT=${{ vars.AZURE_OPENAI_ENDPOINT }}" \
              "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}" \
              "AZURE_OPENAI_DEPLOYMENT=${{ vars.AZURE_OPENAI_DEPLOYMENT }}" \
              "AZURE_OPENAI_API_VERSION=${{ vars.AZURE_OPENAI_API_VERSION }}" \
              "SLM_PROVIDER=${{ vars.SLM_PROVIDER }}" \
              "SUMMARIZE_MODEL=${{ vars.SUMMARIZE_MODEL }}" \
              "DELIVER_MODEL=${{ vars.DELIVER_MODEL }}" \
              "MCP_SCHEME=https" \
              "MCP_HOST=${{ steps.ctx.outputs.mcp_fqdn }}" \
              "MCP_PORT=443" \
              "LOG_LEVEL=${{ vars.LOG_LEVEL }}"

      - name: Deploy orchestrator
        run: |
          az containerapp update -n "${{ vars.ORCHESTRATOR_APP }}" -g "${{ vars.RESOURCE_GROUP }}" \
            --image "${{ steps.ctx.outputs.orchestrator_img }}" \
            --min-replicas 1 --max-replicas 3 \
            --set-env-vars \
              "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
              "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
              "JWT_ALGORITHM=${{ vars.JWT_ALGORITHM }}" \
              "JWT_EXPIRY_MINUTES=${{ vars.JWT_EXPIRY_MINUTES }}" \
              "RECALL_API_KEY=${{ secrets.RECALL_API_KEY }}" \
              "RECALL_WEBHOOK_SECRET=${{ secrets.RECALL_WEBHOOK_SECRET }}" \
              "RECALL_REGION=${{ vars.RECALL_REGION }}" \
              "RECALL_WEBHOOK_BASE_URL=https://${{ steps.ctx.outputs.orchestrator_fqdn }}" \
              "AZURE_OPENAI_ENDPOINT=${{ vars.AZURE_OPENAI_ENDPOINT }}" \
              "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}" \
              "AZURE_OPENAI_DEPLOYMENT=${{ vars.AZURE_OPENAI_DEPLOYMENT }}" \
              "AZURE_OPENAI_API_VERSION=${{ vars.AZURE_OPENAI_API_VERSION }}" \
              "LLM_PROVIDER=${{ vars.LLM_PROVIDER }}" \
              "ORCHESTRATOR_MODEL=${{ vars.ORCHESTRATOR_MODEL }}" \
              "A2A_SCHEME=https" \
              "AGENT_ENABLED=true" \
              "AGENT_HOST=${{ steps.ctx.outputs.agent_fqdn }}" \
              "AGENT_PORT=443" \
              "MCP_SCHEME=https" \
              "MCP_HOST=${{ steps.ctx.outputs.mcp_fqdn }}" \
              "MCP_PORT=443" \
              "LOG_LEVEL=${{ vars.LOG_LEVEL }}"

      - name: Get app URL
        id: get-url
        run: |
          echo "app_url=https://${{ steps.ctx.outputs.orchestrator_fqdn }}" >> $GITHUB_OUTPUT
          echo "Deployed → https://${{ steps.ctx.outputs.orchestrator_fqdn }}"

      - name: Smoke test
        run: |
          URL="${{ steps.get-url.outputs.app_url }}"
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
            [ "$CODE" = "200" ] && { echo "✅ orchestrator up (HTTP $CODE)"; exit 0; }
            echo "attempt $i: HTTP $CODE — retrying in 15s"; sleep 15
          done
          echo "❌ smoke test failed"; exit 1

      - name: Azure logout
        if: always()
        run: az logout || true
